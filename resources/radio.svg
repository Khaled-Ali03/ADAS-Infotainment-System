<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="0" y="0" width="64" height="64" rx="10" fill="#1E2530"/>
  <!-- Radio body -->
  <rect x="12" y="26" width="40" height="24" rx="3" fill="#2C3644" stroke="#22AFFB" stroke-width="1.5"/>
  <!-- Antenna -->
  <line x1="40" y1="26" x2="50" y2="12" stroke="#22AFFB" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="12" r="2.4" fill="#22AFFB"/>
  <!-- Speaker -->
  <circle cx="24" cy="38" r="7" fill="none" stroke="#8AA0B8" stroke-width="1.6"/>
  <circle cx="24" cy="38" r="2.4" fill="#22AFFB"/>
  <!-- Tuner / dial -->
  <rect x="36" y="32" width="12" height="3" rx="1.5" fill="#8AA0B8"/>
  <rect x="36" y="38" width="12" height="3" rx="1.5" fill="#8AA0B8"/>
  <circle cx="44" cy="45" r="2" fill="#22AFFB"/>
</svg>
